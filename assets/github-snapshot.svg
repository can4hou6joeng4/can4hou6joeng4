<svg xmlns="http://www.w3.org/2000/svg" width="980" height="320" viewBox="0 0 980 320" role="img" aria-labelledby="title desc">
  <title id="title">Bobochang GitHub snapshot</title>
  <desc id="desc">Static GitHub profile snapshot with repository, stars, forks, followers, and language summary.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#56d364"/>
      <stop offset="1" stop-color="#238636"/>
    </linearGradient>
    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .card { fill: rgba(22, 27, 34, 0.94); stroke: rgba(139, 148, 158, 0.24); stroke-width: 1; }
      .title { fill: #f0f6fc; font-weight: 800; }
      .text { fill: #f0f6fc; }
      .muted { fill: #8b949e; }
      .blue-text { fill: #58a6ff; }
      .green-text { fill: #56d364; }
      .line { stroke: rgba(139, 148, 158, 0.24); stroke-width: 1; }
    </style>
  </defs>

  <rect width="980" height="320" rx="22" fill="url(#panel)"/>
  <circle cx="845" cy="30" r="145" fill="#1f6feb" opacity="0.08"/>
  <circle cx="70" cy="300" r="120" fill="#238636" opacity="0.08"/>

  <text x="38" y="54" class="sans title" font-size="28">GitHub Snapshot</text>
  <text x="38" y="84" class="sans muted" font-size="15">Public profile and repository summary for can4hou6joeng4</text>

  <g>
    <rect x="38" y="112" width="200" height="86" rx="16" class="card"/>
    <text x="62" y="148" class="sans muted" font-size="14">Public repos</text>
    <text x="62" y="180" class="sans title" font-size="34">19</text>

    <rect x="260" y="112" width="200" height="86" rx="16" class="card"/>
    <text x="284" y="148" class="sans muted" font-size="14">Owned repo stars</text>
    <text x="284" y="180" class="sans title" font-size="34">174</text>

    <rect x="482" y="112" width="200" height="86" rx="16" class="card"/>
    <text x="506" y="148" class="sans muted" font-size="14">Owned repo forks</text>
    <text x="506" y="180" class="sans title" font-size="34">23</text>

    <rect x="704" y="112" width="238" height="86" rx="16" class="card"/>
    <text x="728" y="148" class="sans muted" font-size="14">Followers / Following</text>
    <text x="728" y="180" class="sans title" font-size="34">15 / 31</text>
  </g>

  <rect x="38" y="224" width="904" height="58" rx="16" class="card"/>
  <text x="62" y="258" class="sans muted" font-size="15">Primary public project languages</text>
  <g transform="translate(330 242)">
    <rect x="0" y="0" width="170" height="18" rx="9" fill="#3178c6"/>
    <rect x="170" y="0" width="114" height="18" rx="0" fill="#e34c26"/>
    <rect x="284" y="0" width="114" height="18" rx="0" fill="#b07219"/>
    <rect x="398" y="0" width="57" height="18" rx="0" fill="#00add8"/>
    <rect x="455" y="0" width="57" height="18" rx="0" fill="#f1e05a"/>
    <rect x="512" y="0" width="57" height="18" rx="9" fill="#3572a5"/>
  </g>
  <text x="330" y="280" class="sans text" font-size="13">TypeScript · HTML · Java · Go · JavaScript · Python</text>

  <line x1="38" y1="213" x2="942" y2="213" class="line"/>
  <text x="720" y="54" class="sans blue-text" font-size="15" font-weight="700">Main focus</text>
  <text x="720" y="82" class="sans green-text" font-size="20" font-weight="800">AI agents · CLI · MCP</text>
