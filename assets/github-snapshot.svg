<svg xmlns="http://www.w3.org/2000/svg" width="760" height="260" viewBox="0 0 760 260" role="img" aria-labelledby="title desc">
  <title id="title">Bobochang GitHub metrics snapshot</title>
  <desc id="desc">A compact static card showing Bobochang's public GitHub repository metrics and primary languages.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .card { fill: #161b22; stroke: #30363d; stroke-width: 1; }
      .title { fill: #f0f6fc; font-weight: 750; }
      .text { fill: #f0f6fc; }
      .muted { fill: #8b949e; }
      .blue { fill: #58a6ff; }
      .green { fill: #56d364; }
      .rule { stroke: #30363d; stroke-width: 1; }
    </style>
  </defs>

  <rect width="760" height="260" rx="14" fill="url(#panel)" stroke="#30363d"/>

  <text x="28" y="42" class="sans title" font-size="22">can4hou6joeng4</text>
  <text x="28" y="70" class="sans muted" font-size="14">AI agents · CLI tooling · MCP · open source automation</text>

  <text x="538" y="42" class="sans blue" font-size="13" font-weight="700">Primary focus</text>
  <text x="538" y="70" class="sans green" font-size="19" font-weight="800">AI agents · CLI · MCP</text>

  <line x1="28" y1="92" x2="732" y2="92" class="rule"/>

  <g>
    <rect x="28" y="114" width="162" height="70" rx="12" class="card"/>
    <text x="48" y="143" class="sans muted" font-size="13">Public repos</text>
    <text x="48" y="170" class="sans title" font-size="30">19</text>

    <rect x="206" y="114" width="162" height="70" rx="12" class="card"/>
    <text x="226" y="143" class="sans muted" font-size="13">Owned stars</text>
    <text x="226" y="170" class="sans title" font-size="30">174</text>

    <rect x="384" y="114" width="162" height="70" rx="12" class="card"/>
    <text x="404" y="143" class="sans muted" font-size="13">Owned forks</text>
    <text x="404" y="170" class="sans title" font-size="30">23</text>

    <rect x="562" y="114" width="170" height="70" rx="12" class="card"/>
    <text x="582" y="143" class="sans muted" font-size="13">Followers</text>
    <text x="582" y="170" class="sans title" font-size="30">15</text>
  </g>

  <text x="28" y="218" class="sans muted" font-size="13">Languages</text>
  <g transform="translate(120 205)">
    <rect x="0" y="0" width="180" height="12" rx="6" fill="#3178c6"/>
    <rect x="180" y="0" width="118" height="12" fill="#e34c26"/>
    <rect x="298" y="0" width="118" height="12" fill="#b07219"/>
    <rect x="416" y="0" width="59" height="12" fill="#00add8"/>
    <rect x="475" y="0" width="59" height="12" fill="#f1e05a"/>
    <rect x="534" y="0" width="59" height="12" rx="6" fill="#3572a5"/>
  </g>
  <text x="120" y="239" class="sans text" font-size="12">TypeScript · HTML · Java · Go · JavaScript · Python</text>
</svg>
