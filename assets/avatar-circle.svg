<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Bobochang avatar</title>
  <desc id="desc">A circular GitHub avatar for Bobochang's profile README.</desc>
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#2ea043"/>
    </linearGradient>
    <clipPath id="avatarClip">
      <circle cx="64" cy="64" r="56"/>
    </clipPath>
  </defs>
  <circle cx="64" cy="64" r="61" fill="#0d1117"/>
  <circle cx="64" cy="64" r="59" fill="none" stroke="url(#ring)" stroke-width="4"/>
  <image x="8" y="8" width="112" height="112" href="data:image/jpeg;base64," clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice"/>
</svg>
