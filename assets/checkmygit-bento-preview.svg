<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">Bobochang CheckMyGit Bento portfolio preview</title>
  <desc id="desc">A compact static Bento-style preview for Bobochang's interactive GitHub portfolio.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.58" stop-color="#111827"/>
      <stop offset="1" stop-color="#07362f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#2ea043"/>
    </linearGradient>
    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .shell { fill: rgba(13, 17, 23, 0.72); stroke: rgba(88, 166, 255, 0.18); stroke-width: 1; }
      .card { fill: rgba(22, 27, 34, 0.95); stroke: rgba(139, 148, 158, 0.25); stroke-width: 1; }
      .muted { fill: #8b949e; }
      .text { fill: #f0f6fc; }
      .green { fill: #3fb950; }
      .blue { fill: #58a6ff; }
      .orange { fill: #f78166; }
      .rule { stroke: rgba(139, 148, 158, 0.2); stroke-width: 1; }
    </style>
  </defs>

  <rect width="920" height="360" rx="18" fill="url(#bg)"/>
  <path d="M0 300 C120 250 220 338 360 306 C500 274 590 220 740 252 C820 269 870 300 920 278 L920 360 L0 360 Z" fill="#0a362f" opacity="0.45"/>

  <rect x="34" y="34" width="852" height="292" rx="20" class="shell"/>

  <g transform="translate(64 64)">
    <rect x="0" y="0" width="300" height="136" rx="16" class="card"/>
    <circle cx="42" cy="48" r="26" fill="url(#accent)"/>
    <text x="84" y="42" class="sans text" font-size="26" font-weight="760">Bobochang</text>
    <text x="84" y="70" class="sans muted" font-size="15">AI Agent Developer</text>
    <line x1="26" y1="92" x2="274" y2="92" class="rule"/>
    <text x="26" y="120" class="sans text" font-size="17" font-weight="650">Agent-first automation tools</text>

    <rect x="326" y="0" width="214" height="136" rx="16" class="card"/>
    <text x="350" y="36" class="sans blue" font-size="15" font-weight="750">Main project</text>
    <text x="350" y="73" class="sans text" font-size="25" font-weight="800">boss-agent-cli</text>
    <text x="350" y="112" class="sans green" font-size="24" font-weight="800">160 stars</text>

    <rect x="566" y="0" width="226" height="136" rx="16" class="card"/>
    <text x="590" y="36" class="sans orange" font-size="15" font-weight="750">Open source</text>
    <text x="590" y="74" class="sans text" font-size="24" font-weight="800">Maintainer</text>
    <text x="590" y="108" class="sans muted" font-size="15">Docs · CI · releases</text>

    <rect x="0" y="164" width="247" height="94" rx="16" class="card"/>
    <text x="24" y="200" class="sans blue" font-size="15" font-weight="750">Stack</text>
    <text x="24" y="232" class="sans text" font-size="18" font-weight="700">Python · TypeScript · Go</text>

    <rect x="273" y="164" width="247" height="94" rx="16" class="card"/>
    <text x="297" y="200" class="sans green" font-size="15" font-weight="750">Projects</text>
    <text x="297" y="232" class="sans text" font-size="18" font-weight="700">Legal · interview · automation</text>

    <rect x="546" y="164" width="246" height="94" rx="16" fill="url(#accent)"/>
    <text x="570" y="202" class="sans" fill="#ffffff" font-size="15" font-weight="750">Interactive portfolio</text>
    <text x="570" y="236" class="sans" fill="#ffffff" font-size="22" font-weight="800">CheckMyGit Bento</text>
  </g>
</svg>
